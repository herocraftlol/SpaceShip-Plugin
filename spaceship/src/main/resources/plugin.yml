name: SpaceShip
version: 1.3.2
main: com.spaceship.plugin.SpaceShipPlugin
api-version: 1.21
author: Claude
description: Plugin de minijeu SpaceShip (variante de HikaBrain à plusieurs zones en ligne façon vaisseau) - percez le vaisseau ennemi zone par zone jusqu'à son cœur pour gagner

commands:
  ss:
    description: Commande principale du plugin SpaceShip
    usage: /ss <create|delete|list|arenas|setlobby|setzonecount|setspawn|delspawn|setgoal|setgamezone|setspecspawn|start|stop|join|joinrandom|leave|spectate|unspectate|info|stats|leaderboard>
    aliases: [spaceship]
  ssarenas:
    description: Ouvre le GUI de sélection d'arène SpaceShip
    usage: /ssarenas
  sstournament:
    description: Gère les tournois SpaceShip (bracket à élimination directe)
    usage: /sstournament <create|join|leave|start|cancel|list|info>
    aliases: [sstourney, sst]

permissions:
  spaceship.admin:
    description: Permission pour administrer le jeu SpaceShip (hologramme, reset, setup arènes…)
    default: op
  spaceship.play:
    description: Permission pour jouer au SpaceShip
    default: true
  spaceship.tournament.admin:
    description: Permission pour créer/démarrer/annuler des tournois SpaceShip
    default: op
